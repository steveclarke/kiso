name: Push npm package

on:
  push:
    tags:
      - "npm-v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          registry-url: https://registry.npmjs.org
      - run: npm install -g npm@latest
      - run: npm publish --provenance --access public
